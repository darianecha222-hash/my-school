<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Моя Школа</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #161620;
    --surface2: #1e1e2e;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #f0f0f8;
    --text2: #9090b0;
    --text3: #4a4a6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
  #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  header { border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; flex-wrap: wrap; gap: 10px; }
  .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .saving { font-size: 11px; color: var(--text3); margin-left: 8px; font-weight: 400; }
  .tabs { display: flex; gap: 2px; background: var(--surface); padding: 3px; border-radius: 11px; }
  .tab { padding: 8px 14px; border-radius: 9px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; transition: all .2s; background: transparent; color: var(--text2); }
  .tab.active { background: var(--accent); color: #fff; }
  .main { max-width: 1000px; margin: 0 auto; padding: 20px 14px; }
  .section { display: none; }
  .section.active { display: block; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .section-title { font-size: 20px; font-weight: 800; }
  .btn { padding: 9px 18px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text2); }
  .btn-green { background: rgba(74,222,128,.15); color: var(--green); }
  .btn-danger { background: rgba(248,113,113,.12); color: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .stat-val { font-size: 24px; font-weight: 800; font-family: monospace; }
  .stat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .alert { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 10px; border-left: 3px solid; }
  .alert-red { background: rgba(248,113,113,.08); border-color: var(--red); color: var(--red); }
  .alert-yellow { background: rgba(251,191,36,.08); border-color: var(--yellow); color: var(--yellow); }
  .cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; position: relative; overflow: hidden; transition: border-color .2s; }
  .card:hover { border-color: var(--accent); }
  .card-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .card-name { font-weight: 700; font-size: 16px; }
  .card-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 7px; font-family: monospace; white-space: nowrap; }
  .card-nums { display: flex; gap: 20px; margin-bottom: 12px; }
  .num-big { font-family: monospace; font-size: 26px; font-weight: 700; }
  .num-lbl { font-size: 11px; color: var(--text2); }
  .progress-bar { background: var(--surface2); border-radius: 6px; height: 6px; margin-bottom: 14px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width .4s; }
  .debt-note { font-size: 12px; color: var(--red); margin-bottom: 12px; }
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .teacher-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; position: relative; overflow: hidden; }
  .teacher-rates { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .rate-badge { font-size: 12px; background: var(--surface2); border-radius: 7px; padding: 4px 10px; color: var(--text2); }
  .rate-badge strong { color: var(--text); font-weight: 600; }
  .teacher-nums { display: flex; gap: 20px; margin-bottom: 14px; }
  .salary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 22px; }
  .salary-controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 22px; }
  .field-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .teacher-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid var(--border); }
  .teacher-row:last-child { border-bottom: none; }
  .dur-blocks { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .dur-block { background: var(--surface2); border-radius: 10px; padding: 10px 14px; flex: 1; min-width: 100px; }
  .dur-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .dur-calc { font-family: monospace; font-weight: 700; font-size: 13px; }
  .dur-sum { font-family: monospace; font-size: 14px; color: var(--green); margin-top: 4px; }
  .salary-total { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; margin-top: 4px; }
  .total-sum { font-family: monospace; font-size: 24px; font-weight: 800; color: var(--accent); }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .history-left { display: flex; align-items: center; gap: 10px; }
  .history-date { font-family: monospace; font-size: 11px; color: var(--text3); white-space: nowrap; margin-left: 10px; }
  .empty { text-align: center; padding: 60px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 26px; width: 100%; max-width: 420px; box-shadow: 0 24px 60px rgba(0,0,0,.6); max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform .2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; font-weight: 500; }
  input, select { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; outline: none; transition: border-color .2s; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
  .rates-box { background: var(--surface2); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
  .rates-title { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 12px; }
  .rate-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .rate-row:last-child { margin-bottom: 0; }
  .rate-row-lbl { font-size: 13px; color: var(--text2); width: 80px; flex-shrink: 0; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .preview-box { font-size: 12px; border-radius: 8px; padding: 10px 12px; margin-bottom: 4px; }
  .preview-neutral { background: var(--surface2); color: var(--text2); }
  .preview-green { background: rgba(74,222,128,.08); color: var(--green); }
  @media (max-width: 480px) { .stats-grid { grid-template-columns: repeat(2,1fr); } .tabs { flex-wrap: wrap; } .tab { font-size: 12px; padding: 7px 10px; } }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="loading-screen"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">Загрузка данных…</div></div>
<header>
  <div class="logo">моя <span>школа</span><span class="saving" id="saving-indicator"></span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('students',this)">Ученики</button>
    <button class="tab" onclick="switchTab('teachers',this)">Учителя</button>
    <button class="tab" onclick="switchTab('salary',this)">Зарплата</button>
    <button class="tab" onclick="switchTab('history',this)">История</button>
  </div>
</header>
<div class="main">
  <div class="section active" id="tab-students">
    <div class="section-header"><div class="section-title">Ученики</div><button class="btn btn-primary" onclick="openModal('addStudent')">+ Добавить</button></div>
    <div class="stats-grid" id="students-stats"></div>
    <div id="students-alerts"></div>
    <div class="cards" id="students-list"></div>
  </div>
  <div class="section" id="tab-teachers">
    <div class="section-header"><div class="section-title">Учителя</div><button class="btn btn-primary" onclick="openModal('addTeacher')">+ Добавить</button></div>
    <div class="cards" id="teachers-list"></div>
  </div>
  <div class="section" id="tab-salary">
    <div class="section-header"><div class="section-title">Зарплата</div></div>
    <div class="salary-box">
      <div class="salary-controls">
        <div><div class="field-label">С</div><input type="date" id="sal-from" style="width:150px"></div>
        <div><div class="field-label">По</div><input type="date" id="sal-to" style="width:150px"></div>
        <button class="btn btn-primary" onclick="calcSalary()">Рассчитать</button>
        <button class="btn btn-ghost" onclick="setTwoWeeks()">2 недели</button>
      </div>
      <div id="salary-results"><div style="color:var(--text3);font-size:13px">Выберите период и нажмите «Рассчитать»</div></div>
    </div>
  </div>
  <div class="section" id="tab-history">
    <div class="section-header"><div class="section-title">История</div><button class="btn btn-danger btn-sm" onclick="clearHistory()">Очистить</button></div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-addStudent" onclick="closeModalOverlay(event,'addStudent')">
  <div class="modal">
    <div class="modal-title">Новый ученик</div>
    <div class="field"><label>Имя ученика</label><input type="text" id="s-name" placeholder="Имя"></div>
    <div class="field"><label>Учитель</label><select id="s-teacher"><option value="">— выбрать —</option></select></div>
    <div class="field"><label>Длительность урока</label><select id="s-dur"><option value="30">30 минут</option><option value="45" selected>45 минут</option><option value="60">60 минут</option></select></div>
    <div class="field"><label>Уроков в пакете</label><input type="number" id="s-pack" value="8" min="1"></div>
    <div class="field"><label>Уроков осталось сейчас</label><input type="number" id="s-current" value="8" min="0"></div>
    <div class="field"><label>Стоимость одного урока (₽)</label><input type="number" id="s-price" placeholder="1500"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('addStudent')">Отмена</button><button class="btn btn-primary" onclick="addStudent()">Добавить</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-addTeacher" onclick="closeModalOverlay(event,'addTeacher')">
  <div class="modal">
    <div class="modal-title">Новый учитель</div>
    <div class="field"><label>Имя учителя</label><input type="text" id="t-name" placeholder="Имя"></div>
    <div class="rates-box">
      <div class="rates-title">Ставка за урок (₽)</div>
      <div class="rate-row"><div class="rate-row-lbl">30 минут</div><input type="number" id="t-r30" placeholder="0" style="flex:1"></div>
      <div class="rate-row"><div class="rate-row-lbl">45 минут</div><input type="number" id="t-r45" placeholder="0" style="flex:1"></div>
      <div class="rate-row"><div class="rate-row-lbl">60 минут</div><input type="number" id="t-r60" placeholder="0" style="flex:1"></div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('addTeacher')">Отмена</button><button class="btn btn-primary" onclick="addTeacher()">Добавить</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-logLesson" onclick="closeModalOverlay(event,'logLesson')">
  <div class="modal">
    <div class="modal-title" id="ll-title">Урок</div>
    <div class="field"><label>Дата урока</label><input type="date" id="ll-date"></div>
    <div class="field"><label>Количество уроков</label><input type="number" id="ll-count" value="1" min="1" max="10" oninput="updateLessonPreview()"></div>
    <div class="preview-box preview-neutral" id="ll-preview"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('logLesson')">Отмена</button><button class="btn btn-primary" onclick="logLesson()">Записать</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-addLessons" onclick="closeModalOverlay(event,'addLessons')">
  <div class="modal">
    <div class="modal-title" id="al-title">Оплата</div>
    <div class="field"><label>Добавить уроков</label><input type="number" id="al-count" value="8" min="1" oninput="updatePayPreview()"></div>
    <div class="preview-box preview-green" id="al-preview"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('addLessons')">Отмена</button><button class="btn btn-green" onclick="addLessons()">Пополнить</button></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyBvboVfdFQgRi2--qLGEWz4_rEue6fR7LI", authDomain: "my-school-a11bc.firebaseapp.com", projectId: "my-school-a11bc", storageBucket: "my-school-a11bc.firebasestorage.app", messagingSenderId: "599574421079", appId: "1:599574421079:web:864e2bec8686dc738bcd12" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db; window._setDoc = setDoc; window._doc = doc;
  try {
    const snap = await getDoc(doc(db, "school", "data"));
    if (snap.exists()) { const d = snap.data(); window._students = d.students||[]; window._teachers = d.teachers||[]; window._history = d.history||[]; }
    else { window._students = []; window._teachers = []; window._history = []; }
  } catch(e) { console.error(e); window._students = []; window._teachers = []; window._history = []; }
  document.getElementById('loading-screen').style.display = 'none';
  window.renderAll();
</script>

<script>
  window._students = window._students||[]; window._teachers = window._teachers||[]; window._history = window._history||[];
  window._currentLesson = null; window._currentPay = null;
  const DURATIONS = [30,45,60];
  function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
  function today() { return new Date().toISOString().split('T')[0]; }
  function fmtDate(d) { if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}); }
  function status(l) { return l<=0?'danger':l<=2?'warning':'ok'; }
  function statusColor(s) { return s==='ok'?'var(--green)':s==='warning'?'var(--yellow)':'var(--red)'; }

  async function saveAll() {
    if(!window._db) return;
    const ind = document.getElementById('saving-indicator');
    ind.textContent = 'сохраняю…';
    try {
      await window._setDoc(window._doc(window._db,'school','data'),{students:window._students,teachers:window._teachers,history:window._history});
      ind.textContent = '✓ сохранено'; setTimeout(()=>ind.textContent='',2000);
    } catch(e) { ind.textContent = '⚠ ошибка'; console.error(e); }
  }

  function switchTab(name,btn) {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active'); btn.classList.add('active');
  }
  function openModal(name,data) {
    if(name==='addStudent'){const sel=document.getElementById('s-teacher');sel.innerHTML='<option value="">— выбрать —</option>';window._teachers.forEach(t=>sel.innerHTML+=`<option value="${t.id}">${t.name}</option>`);}
    if(name==='logLesson'&&data){window._currentLesson=data;document.getElementById('ll-title').textContent='Урок: '+data.name;document.getElementById('ll-date').value=today();document.getElementById('ll-count').value='1';updateLessonPreview();}
    if(name==='addLessons'&&data){window._currentPay=data;document.getElementById('al-title').textContent='Оплата: '+data.name;document.getElementById('al-count').value=String(data.pack||8);updatePayPreview();}
    document.getElementById('modal-'+name).classList.add('open');
  }
  function closeModal(name){document.getElementById('modal-'+name).classList.remove('open');}
  function closeModalOverlay(e,name){if(e.target===document.getElementById('modal-'+name))closeModal(name);}
  function updateLessonPreview(){const s=window._currentLesson;if(!s)return;const c=parseInt(document.getElementById('ll-count').value)||1;document.getElementById('ll-preview').textContent=`Длительность: ${s.duration} мин · Останется: ${s.lessons-c} уроков`;}
  function updatePayPreview(){const s=window._currentPay;if(!s)return;const c=parseInt(document.getElementById('al-count').value)||0;document.getElementById('al-preview').textContent=s.price?`Сумма к получению: ${(c*s.price).toLocaleString('ru')} ₽`:`Добавится ${c} уроков`;}

  function addStudent(){const name=document.getElementById('s-name').value.trim();if(!name)return alert('Введите имя');const s={id:uid(),name,teacherId:document.getElementById('s-teacher').value,duration:parseInt(document.getElementById('s-dur').value)||45,pack:parseInt(document.getElementById('s-pack').value)||8,lessons:parseInt(document.getElementById('s-current').value)||0,price:parseFloat(document.getElementById('s-price').value)||0};window._students.push(s);saveAll();closeModal('addStudent');document.getElementById('s-name').value='';renderStudents();}
  function addTeacher(){const name=document.getElementById('t-name').value.trim();if(!name)return alert('Введите имя');const t={id:uid(),name,rates:{30:parseFloat(document.getElementById('t-r30').value)||0,45:parseFloat(document.getElementById('t-r45').value)||0,60:parseFloat(document.getElementById('t-r60').value)||0}};window._teachers.push(t);saveAll();closeModal('addTeacher');document.getElementById('t-name').value='';document.getElementById('t-r30').value='';document.getElementById('t-r45').value='';document.getElementById('t-r60').value='';renderTeachers();}
  function logLesson(){const s=window._currentLesson;if(!s)return;const count=parseInt(document.getElementById('ll-count').value)||1;const date=document.getElementById('ll-date').value;window._students=window._students.map(st=>st.id===s.id?{...st,lessons:st.lessons-count}:st);window._history.unshift({id:uid(),type:'lesson',date,studentId:s.id,studentName:s.name,teacherId:s.teacherId,duration:s.duration,count});saveAll();closeModal('logLesson');renderAll();}
  function addLessons(){const s=window._currentPay;if(!s)return;const count=parseInt(document.getElementById('al-count').value)||8;window._students=window._students.map(st=>st.id===s.id?{...st,lessons:st.lessons+count}:st);window._history.unshift({id:uid(),type:'payment',date:today(),studentId:s.id,studentName:s.name,count});saveAll();closeModal('addLessons');renderAll();}
  function deleteStudent(id){if(!confirm('Удалить ученика?'))return;window._students=window._students.filter(s=>s.id!==id);saveAll();renderStudents();}
  function deleteTeacher(id){if(!confirm('Удалить учителя?'))return;window._teachers=window._teachers.filter(t=>t.id!==id);saveAll();renderTeachers();}
  function clearHistory(){if(!confirm('Очистить историю?'))return;window._history=[];saveAll();renderHistory();}
  function setTwoWeeks(){const to=new Date(),from=new Date();from.setDate(from.getDate()-14);document.getElementById('sal-to').value=to.toISOString().split('T')[0];document.getElementById('sal-from').value=from.toISOString().split('T')[0];}

  function calcSalary(){
    const from=document.getElementById('sal-from').value,to=document.getElementById('sal-to').value,el=document.getElementById('salary-results');
    if(!from||!to){el.innerHTML='<div style="color:var(--text3);font-size:13px">Выберите период</div>';return;}
    const lessons=window._history.filter(h=>h.type==='lesson'&&h.date>=from&&h.date<=to);
    if(!window._teachers.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">Нет учителей</div>';return;}
    let totalAll=0,html='';
    window._teachers.forEach(t=>{
      let total=0,totalCount=0,durHtml='';
      DURATIONS.forEach(dur=>{const tl=lessons.filter(l=>l.teacherId===t.id&&(l.duration||45)===dur);const cnt=tl.reduce((s,l)=>s+(l.count||1),0);if(!cnt)return;const rate=(t.rates||{})[dur]||0;const amt=cnt*rate;total+=amt;totalCount+=cnt;durHtml+=`<div class="dur-block"><div class="dur-lbl">${dur} мин</div><div class="dur-calc">${cnt} ур × ${rate} ₽</div><div class="dur-sum">${amt.toLocaleString('ru')} ₽</div></div>`;});
      totalAll+=total;
      html+=`<div class="teacher-row"><div style="flex:1"><div style="font-weight:700;font-size:16px">${t.name}</div>${totalCount===0?'<div style="font-size:13px;color:var(--text3);margin-top:6px">Нет уроков за период</div>':`<div class="dur-blocks">${durHtml}</div>`}</div><div style="font-family:monospace;font-size:20px;font-weight:800;color:var(--green);margin-left:16px;white-space:nowrap">${total.toLocaleString('ru')} ₽</div></div>`;
    });
    html+=`<div class="salary-total"><div style="font-weight:700">Итого к выплате</div><div class="total-sum">${totalAll.toLocaleString('ru')} ₽</div></div>`;
    el.innerHTML=html;
  }

  function renderStudents(){
    const sorted=[...window._students].sort((a,b)=>a.lessons-b.lessons);
    const urgent=window._students.filter(s=>s.lessons<=0),warn=window._students.filter(s=>s.lessons>0&&s.lessons<=2);
    document.getElementById('students-stats').innerHTML=[{val:window._students.length,lbl:'Всего',color:'var(--accent)'},{val:window._students.filter(s=>s.lessons>2).length,lbl:'Активных',color:'var(--green)'},{val:warn.length,lbl:'Мало уроков',color:'var(--yellow)'},{val:urgent.length,lbl:'Нужна оплата',color:'var(--red)'}].map(({val,lbl,color})=>`<div class="stat-card"><div class="stat-val" style="color:${color}">${val}</div><div class="stat-lbl">${lbl}</div></div>`).join('');
    let alertsHtml='';
    if(urgent.length)alertsHtml+=`<div class="alert alert-red">🔴 Долг: ${urgent.map(s=>s.name).join(', ')}</div>`;
    if(warn.length)alertsHtml+=`<div class="alert alert-yellow">⚠️ Мало уроков: ${warn.map(s=>`${s.name} (${s.lessons})`).join(', ')}</div>`;
    document.getElementById('students-alerts').innerHTML=alertsHtml;
    if(!window._students.length){document.getElementById('students-list').innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👩‍🎓</div>Добавьте первого ученика</div>`;return;}
    document.getElementById('students-list').innerHTML=sorted.map(s=>{
      const teacher=window._teachers.find(t=>t.id===s.teacherId);const st=status(s.lessons);const color=statusColor(st);const pct=Math.max(0,Math.min(100,(s.lessons/(s.pack||8))*100));
      const badgeBg=st==='ok'?'rgba(74,222,128,.15)':st==='warning'?'rgba(251,191,36,.15)':'rgba(248,113,113,.15)';
      const badgeText=st==='ok'?'OK':st==='warning'?'Мало':'Долг';
      const sn=s.name.replace(/'/g,"\\'");
      return `<div class="card"><div class="card-bar" style="background:${color}"></div><div class="card-top"><div><div class="card-name">${s.name}</div><div class="card-sub">${teacher?teacher.name:'—'} · ${s.duration} мин${s.price?' · '+s.price+' ₽/ур':''}</div></div><span class="badge" style="background:${badgeBg};color:${color}">${badgeText}</span></div><div class="card-nums"><div><div class="num-big" style="color:${color}">${s.lessons}</div><div class="num-lbl">осталось</div></div><div><div class="num-big" style="color:var(--text3)">${s.pack||8}</div><div class="num-lbl">в пакете</div></div></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>${s.lessons<0?`<div class="debt-note">⚠️ Долг: ${Math.abs(s.lessons)} ур.${s.price?' ('+( Math.abs(s.lessons)*s.price).toLocaleString('ru')+' ₽)':''}</div>`:''}<div class="card-actions"><button class="btn btn-ghost btn-sm" onclick="openModal('logLesson',{id:'${s.id}',name:'${sn}',lessons:${s.lessons},duration:${s.duration},pack:${s.pack||8},teacherId:'${s.teacherId||''}',price:${s.price||0}})">✓ Урок</button><button class="btn btn-green btn-sm" onclick="openModal('addLessons',{id:'${s.id}',name:'${sn}',pack:${s.pack||8},price:${s.price||0}})">＋ Оплата</button><button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">✕</button></div></div>`;
    }).join('');
  }

  function renderTeachers(){
    if(!window._teachers.length){document.getElementById('teachers-list').innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👩‍🏫</div>Добавьте первого учителя</div>`;return;}
    document.getElementById('teachers-list').innerHTML=window._teachers.map(t=>{
      const myStudents=window._students.filter(s=>s.teacherId===t.id);const totalLessons=window._history.filter(h=>h.type==='lesson'&&h.teacherId===t.id).reduce((s,l)=>s+(l.count||1),0);const rates=t.rates||{};
      return `<div class="teacher-card"><div class="card-bar" style="background:var(--accent)"></div><div class="card-name" style="margin-bottom:4px;margin-top:4px">${t.name}</div><div class="teacher-rates">${DURATIONS.map(d=>`<span class="rate-badge">${d} мин — <strong>${rates[d]||0} ₽</strong></span>`).join('')}</div><div class="teacher-nums"><div><div class="num-big" style="color:var(--accent)">${myStudents.length}</div><div class="num-lbl">учеников</div></div><div><div class="num-big" style="color:var(--green)">${totalLessons}</div><div class="num-lbl">уроков всего</div></div></div><button class="btn btn-danger btn-sm" onclick="deleteTeacher('${t.id}')">Удалить</button></div>`;
    }).join('');
  }

  function renderHistory(){
    if(!window._history.length){document.getElementById('history-list').innerHTML=`<div class="empty"><div class="empty-icon">📋</div>История пуста</div>`;return;}
    document.getElementById('history-list').innerHTML=window._history.slice(0,100).map(h=>`<div class="history-item"><div class="history-left"><span style="color:${h.type==='lesson'?'var(--accent)':'var(--green)'};font-size:16px">${h.type==='lesson'?'✓':'💳'}</span><span>${h.type==='lesson'?`Урок: ${h.studentName} — ${h.count} ур. ${h.duration?'('+h.duration+' мин)':''}`:`Оплата: ${h.studentName} +${h.count} уроков`}</span></div><span class="history-date">${fmtDate(h.date)}</span></div>`).join('');
  }

  window.renderAll=function(){renderStudents();renderTeachers();renderHistory();setTwoWeeks();};
  setTwoWeeks();
</script>
</body>
</html>
